<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obsidian Builder — Live Page Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* =====================================================
       CSS RESET & ROOT VARIABLES
    ===================================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-deepest:     #0A0A0A;
      --bg-deep:        #121212;
      --bg-card:        #1E1E1E;
      --bg-input:       #262626;
      --bg-hover:       #2E2E2E;
      --border-subtle:  #2A2A2A;
      --border-active:  #3A3A3A;
      --accent:         #2563EB;
      --accent-hover:   #1D4ED8;
      --accent-light:   rgba(37, 99, 235, 0.15);
      --accent-glow:    rgba(37, 99, 235, 0.35);
      --text-primary:   #FFFFFF;
      --text-secondary: #C9D1DB;
      --text-muted:     #9CA3AF;
      --text-dim:       #6B7280;
      --success:        #10B981;
      --warning:        #F59E0B;
      --danger:         #EF4444;
      --canvas-bg:      #F3F4F6;
      --sidebar-width:  340px;
      --radius-sm:      4px;
      --radius-md:      8px;
      --radius-lg:      12px;
      --font-main:      'Poppins', sans-serif;
      --transition:     0.18s ease;
      --shadow-card:    0 2px 8px rgba(0,0,0,0.4);
      --shadow-elevated: 0 8px 24px rgba(0,0,0,0.6);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font-main);
      background: var(--bg-deepest);
      color: var(--text-primary);
    }

    /* =====================================================
       APP SHELL LAYOUT
    ===================================================== */
    #app {
      display: flex;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* =====================================================
       LEFT SIDEBAR / CONTROL PANEL
    ===================================================== */
    #sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      height: 100vh;
      background: var(--bg-deep);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 10;
    }

    /* Sidebar Header */
    #sidebar-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
      background: var(--bg-deepest);
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-icon svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .brand-name {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--text-primary);
    }

    .brand-sub {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Save Button */
    #btn-save {
      width: 100%;
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-main);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
      letter-spacing: 0.02em;
    }

    #btn-save:hover {
      background: var(--accent-hover);
      box-shadow: 0 0 18px var(--accent-glow);
    }

    #btn-save:active {
      transform: scale(0.98);
    }

    #btn-save.saving {
      background: var(--accent-hover);
      pointer-events: none;
      opacity: 0.85;
    }

    #btn-save.saved {
      background: var(--success);
    }

    #btn-save svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* Sidebar Scrollable Body */
    #sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #sidebar-body::-webkit-scrollbar {
      width: 4px;
    }
    #sidebar-body::-webkit-scrollbar-track {
      background: transparent;
    }
    #sidebar-body::-webkit-scrollbar-thumb {
      background: var(--border-active);
      border-radius: 2px;
    }

    /* =====================================================
       SIDEBAR CARDS / SECTIONS
    ===================================================== */
    .ctrl-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .ctrl-card-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctrl-card-header .card-icon {
      width: 20px;
      height: 20px;
      border-radius: var(--radius-sm);
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .ctrl-card-header .card-icon svg {
      width: 11px;
      height: 11px;
      fill: var(--accent);
    }

    .ctrl-card-header .card-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .ctrl-card-body {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* =====================================================
       FORM CONTROLS
    ===================================================== */
    .ctrl-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      margin-bottom: 5px;
      display: block;
    }

    .ctrl-group {
      display: flex;
      flex-direction: column;
    }

    /* Text Input */
    .ctrl-input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      color: var(--text-primary);
      font-family: var(--font-main);
      font-size: 12px;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .ctrl-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-light);
    }

    .ctrl-input::placeholder {
      color: var(--text-dim);
    }

    /* Color Picker Row */
    .color-picker-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .color-swatch-wrap {
      position: relative;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border-active);
      flex-shrink: 0;
      cursor: pointer;
    }

    .color-swatch-wrap input[type="color"] {
      position: absolute;
      top: -6px;
      left: -6px;
      width: 48px;
      height: 48px;
      border: none;
      cursor: pointer;
      opacity: 0;
    }

    .color-swatch-preview {
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .color-hex-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      color: var(--text-primary);
      font-family: var(--font-main);
      font-size: 12px;
      outline: none;
      transition: border-color var(--transition);
    }

    .color-hex-input:focus {
      border-color: var(--accent);
    }

    /* Slider */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ctrl-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 4px;
      background: var(--border-active);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .ctrl-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent-glow);
      cursor: pointer;
      transition: box-shadow var(--transition);
    }

    .ctrl-slider::-webkit-slider-thumb:hover {
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .slider-value {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      min-width: 36px;
      text-align: right;
    }

    /* Segment Control */
    .segment-control {
      display: flex;
      background: var(--bg-input);
      border-radius: var(--radius-sm);
      padding: 3px;
      gap: 2px;
    }

    .segment-btn {
      flex: 1;
      padding: 6px 4px;
      background: transparent;
      border: none;
      border-radius: calc(var(--radius-sm) - 1px);
      color: var(--text-muted);
      font-family: var(--font-main);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .segment-btn:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
    }

    .segment-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .segment-btn svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
    }

    /* Toggle Button */
    .toggle-btn {
      padding: 8px 14px;
      border: 1px solid var(--border-active);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-main);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
    }

    .toggle-btn.active {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Action Buttons */
    .action-btn {
      width: 100%;
      padding: 9px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-family: var(--font-main);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all var(--transition);
      text-align: left;
    }

    .action-btn:hover {
      background: var(--bg-hover);
      border-color: var(--border-active);
      color: var(--text-primary);
    }

    .action-btn.danger:hover {
      background: rgba(239, 68, 68, 0.1);
      border-color: var(--danger);
      color: var(--danger);
    }

    .action-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* File Upload */
    .file-upload-zone {
      border: 1px dashed var(--border-active);
      border-radius: var(--radius-sm);
      padding: 14px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
    }

    .file-upload-zone:hover {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .file-upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .file-upload-zone .upload-icon {
      font-size: 20px;
      margin-bottom: 6px;
      color: var(--text-muted);
    }

    .file-upload-zone .upload-text {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .file-upload-zone .upload-text strong {
      color: var(--accent);
    }

    /* Paste URL row */
    .url-input-row {
      display: flex;
      gap: 6px;
    }

    .url-input-row .ctrl-input {
      flex: 1;
    }

    .url-input-row .paste-btn {
      padding: 8px 10px;
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }

    .url-input-row .paste-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .url-input-row .paste-btn svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
    }

    .url-apply-btn {
      width: 100%;
      padding: 8px;
      background: var(--accent-light);
      border: 1px solid rgba(37,99,235,0.3);
      border-radius: var(--radius-sm);
      color: var(--accent);
      font-family: var(--font-main);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
    }

    .url-apply-btn:hover {
      background: var(--accent);
      color: #fff;
    }

    /* =====================================================
       IDLE STATE (No Selection)
    ===================================================== */
    .idle-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 20px 16px;
      gap: 14px;
    }

    .idle-graphic {
      width: 64px;
      height: 64px;
      background: var(--accent-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(37,99,235,0.25);
    }

    .idle-graphic svg {
      width: 28px;
      height: 28px;
      fill: var(--accent);
    }

    .idle-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .idle-message {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* Selection Breadcrumb */
    .selection-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--accent-light);
      border: 1px solid rgba(37,99,235,0.3);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 2px;
    }

    .selection-badge .tag-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse-dot 1.5s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    /* =====================================================
       STATUS BAR
    ===================================================== */
    #status-bar {
      padding: 8px 16px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: var(--bg-deepest);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background var(--transition);
    }

    .status-dot.connected { background: var(--success); }
    .status-dot.saving    { background: var(--warning); }
    .status-dot.error     { background: var(--danger); }

    .status-text {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* =====================================================
       RIGHT PREVIEW CANVAS
    ===================================================== */
    #preview-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--canvas-bg);
      overflow: hidden;
      position: relative;
    }

    /* Toolbar above iframe */
    #preview-toolbar {
      background: #E5E7EB;
      border-bottom: 1px solid #D1D5DB;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .browser-dots {
      display: flex;
      gap: 6px;
    }

    .browser-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .browser-dot.red   { background: #FC5F57; }
    .browser-dot.yellow{ background: #FDBC2C; }
    .browser-dot.green { background: #27C93F; }

    .preview-url-bar {
      flex: 1;
      background: #fff;
      border: 1px solid #D1D5DB;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 11px;
      color: #6B7280;
      font-family: var(--font-main);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .preview-url-bar svg {
      width: 11px;
      height: 11px;
      fill: var(--success);
      flex-shrink: 0;
    }

    /* iframe wrapper */
    #iframe-wrapper {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28px;
      overflow: auto;
    }

    #preview-frame {
      width: 100%;
      max-width: 1100px;
      height: 100%;
      min-height: 600px;
      border: none;
      border-radius: var(--radius-md);
      box-shadow: 0 10px 25px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.05);
      background: #fff;
      display: block;
    }

    /* Loading overlay for iframe */
    #iframe-loading {
      position: absolute;
      inset: 0;
      background: var(--canvas-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 5;
      transition: opacity 0.3s ease;
    }

    #iframe-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #E5E7EB;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 13px;
      color: #6B7280;
      font-family: var(--font-main);
    }

    /* =====================================================
       TOAST NOTIFICATION
    ===================================================== */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-family: var(--font-main);
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: toast-in 0.25s ease forwards;
      box-shadow: var(--shadow-elevated);
      min-width: 220px;
      max-width: 320px;
    }

    .toast.success { background: #064E3B; color: #6EE7B7; border: 1px solid #065F46; }
    .toast.error   { background: #7F1D1D; color: #FCA5A5; border: 1px solid #991B1B; }
    .toast.info    { background: #1E3A5F; color: #93C5FD; border: 1px solid #1D4ED8; }

    .toast svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(10px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes toast-out {
      to { opacity: 0; transform: translateY(6px) scale(0.96); }
    }

    .toast.removing {
      animation: toast-out 0.2s ease forwards;
    }

    /* =====================================================
       MOBILE RESPONSIVE
    ===================================================== */
    @media (max-width: 768px) {
      :root {
        --sidebar-width: 100vw;
      }

      #app {
        flex-direction: column;
      }

      #sidebar {
        width: 100%;
        height: auto;
        max-height: 50vh;
        border-right: none;
        border-bottom: 1px solid var(--border-subtle);
      }

      #preview-area {
        flex: 1;
      }

      #iframe-wrapper {
        padding: 12px;
      }

      #preview-frame {
        min-height: 300px;
      }
    }

    /* =====================================================
       SEPARATOR
    ===================================================== */
    .ctrl-divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 2px 0;
    }

    /* Font weight toggle row */
    .toggle-row {
      display: flex;
      gap: 6px;
    }

    .toggle-row .toggle-btn {
      flex: 1;
      text-align: center;
    }

    /* Utility */
    .hidden { display: none !important; }
    .flex-row { display: flex; gap: 8px; }
    .text-accent { color: var(--accent); }
    .text-muted { color: var(--text-muted); font-size: 11px; }
  </style>
</head>
<body>

<div id="app">

  <!-- =====================================================
       LEFT SIDEBAR
  ===================================================== -->
  <aside id="sidebar">

    <!-- Header: Brand + Save Button -->
    <div id="sidebar-header">
      <div class="brand-row">
        <div class="brand-icon">
          <!-- Layers icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">Obsidian Builder</div>
          <div class="brand-sub">Live Page Editor</div>
        </div>
      </div>

      <button id="btn-save">
        <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2zM17 21v-8H7v8M7 3v5h8"/></svg>
        <span id="btn-save-text">Save Changes</span>
      </button>
    </div>

    <!-- Dynamic Controls Body -->
    <div id="sidebar-body">
      <!-- Populated by JS -->
    </div>

function showToast(type, message, duration = 3000) {
  const icons = {
    success: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,

    info:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`
  };
  const container = document.getElementById("toast-container");
  const toast = document.createElement("div");
  toast.className = `toast ${type}`;
  toast.innerHTML = `${icons[type]}<span>${message}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add("removing");
    toast.addEventListener("animationend", () => toast.remove(), { once: true });
  }, duration);
}

// ============================================================
// WRITE HTML INTO IFRAME  — uses srcdoc (no sandbox restriction)
// ============================================================
function writeToIframe(html) {
  // srcdoc works reliably across all browsers without needing
  // allow-same-origin; once loaded we grab the document reference.
  frame.srcdoc = html;

  frame.onload = () => {
    iframeDoc = frame.contentDocument || frame.contentWindow.document;
    attachIframeListeners();

    // Hide loading overlay
    iframeLoader.classList.add("hidden");
    setStatus("connected", "Page loaded");
  };

  // Safety net — hide loader after 5s no matter what
  setTimeout(() => {
    iframeLoader.classList.add("hidden");
  }, 5000);
}

// ============================================================
// IFRAME CLICK DELEGATION
// ============================================================
function attachIframeListeners() {
  if (!iframeDoc || !iframeDoc.body) return;

  iframeDoc.body.addEventListener("click", (e) => {
    e.preventDefault();
    e.stopPropagation();

    const target = e.target;

    // Clicking the same element deselects
    if (target === selectedEl) {
      deselectElement();
      return;
    }

    clearOutline();
    selectedEl = target;
    applyOutline(selectedEl);
    renderSidebarForElement(selectedEl);
  });
}

function applyOutline(el) {
  if (!el) return;
  el.setAttribute("data-builder-selected", "true");
  el.style.outline       = "2px dashed #2563EB";
  el.style.outlineOffset = "4px";
}

function clearOutline() {
  if (!selectedEl) return;
  selectedEl.style.outline       = "";
  selectedEl.style.outlineOffset = "";
  selectedEl.removeAttribute("data-builder-selected");
}

function deselectElement() {
  clearOutline();
  selectedEl = null;
  renderIdleState();
}

function classifyElement(el) {
  const tag = el.tagName.toUpperCase();
  if (el.classList.contains("gallery"))       return "gallery";

  if (tag === "IMG")                          return "image";
  if (TEXT_TAGS.has(tag))                     return "text";

}
