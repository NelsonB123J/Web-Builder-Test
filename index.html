<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Obsidian Builder — Live Page Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div id="app">

  <!-- ═══ SIDEBAR ═══════════════════════════════════════════ -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <div class="brand-row">
        <div class="brand-icon">
          <!-- Layers icon: stroke-based, renders correctly -->
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <polygon points="12 2 2 7 12 12 22 7"/>
            <polyline points="2 17 12 22 22 17"/>
            <polyline points="2 12 12 17 22 12"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">Obsidian Builder</div>
          <div class="brand-sub">Live Page Editor</div>
        </div>
      </div>
      <button id="btn-save" aria-label="Save changes to Firebase">
        <!-- Save / floppy disk icon -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        <span id="btn-save-text">Save Changes</span>
      </button>
    </div>

    <!-- Dynamic control panels injected here by JS -->
    <div id="sidebar-body"></div>

    <div id="status-bar">
      <div class="status-text">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-label">Initializing…</span>
      </div>
      <span style="font-size:10px;color:var(--text-dim)">user_site_01</span>
    </div>
  </aside>

  <!-- ═══ PREVIEW CANVAS ════════════════════════════════════ -->
  <div id="preview-area">
    <!-- Mock browser chrome -->
    <div id="preview-toolbar" aria-hidden="true">
      <div class="browser-dots">
        <div class="browser-dot red"></div>
        <div class="browser-dot yellow"></div>
        <div class="browser-dot green"></div>
      </div>
      <div class="preview-url-bar">
        <svg viewBox="0 0 24 24" fill="#10B981">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        user_site_01 — Live Preview
      </div>
    </div>

    <!-- Loading overlay (visible until iframe loads) -->
    <div id="iframe-loading" role="status" aria-live="polite">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading from Firebase…</div>
    </div>

    <!-- Preview iframe — no sandbox so srcdoc + contentDocument work -->
    <div id="iframe-wrapper">
      <iframe id="preview-frame" title="Live Page Preview"></iframe>
    </div>
  </div>

</div><!-- /#app -->

<!-- Toast container -->
<div id="toast-container" aria-live="assertive" aria-atomic="true"></div>

<!-- ═══════════════════════════════════════════════════════════
     APPLICATION LOGIC — ES Module (imports Firebase via CDN)
═══════════════════════════════════════════════════════════ -->
<script type="module" src="./app.js"></script>
</body>
</html>
